<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Akan name generator</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header>
      <h1>Akan Name Generator</h1>
    </header>
    <div class="container">
      <p>Enter your date of birth and gender to find your Akan name.</p>

      <form>
        <label for="day">Day:</label>
        <input type="number" id="day" />
        <br /><br />

        <label for="month">Month:</label>
        <input type="number" id="month" />
        <br /><br />

        <label for="year">Year:</label>
        <input type="number" id="year" />
        <br /><br />

        <label for="gender">Gender:</label>
        <select id="gender">
          <option value="">--Select Gender--</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
        <br /><br />

        <!-- button -->
        <button type="submit">Get Akan Name</button>
      </form>
      <section id="result-container">
        <h2>Your Result</h2>
        <p id="result">Your Akan name will appear here</p>
      </section>
    </div>
    <script src="./code.js"></script>
  </body>
</html>
