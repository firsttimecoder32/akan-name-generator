<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Akan name generator</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header>
      <h1>Akan Name Generator</h1>
    </header>
    <div class="container">
      <p>Enter your date of birth and gender to find your Akan name.</p>

      <form>
        <!-- DAY -->
        <label for="day">Day</label>
        <input type="number" id="day" min="1" max="31" required />

        <!-- MONTH -->
        <label for="month">Month</label>
        <select id="month" required>
          <option value="">Select month</option>
          <option value="1">January</option>
          <option value="2">February</option>
          <option value="3">March</option>
          <option value="4">April</option>
          <option value="5">May</option>
          <option value="6">June</option>
          <option value="7">July</option>
          <option value="8">August</option>
          <option value="9">September</option>
          <option value="10">October</option>
          <option value="11">November</option>
          <option value="12">December</option>
        </select>

        <!-- YEAR -->
        <label for="year">Year</label>
        <input
          type="text"
          id="year"
          required
          pattern="\d{4}"
          title="Enter a 4-digit year"
        />

        <!-- GENDER -->
        <label for="gender">Gender</label>
        <select id="gender" required>
          <option value="">Select gender</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>

        <button type="submit">Get your Akan name</button>
      </form>

      <section id="result-container">
        <h2>Your Result</h2>
        <p id="result">Your Akan name will appear here</p>
      </section>
    </div>
    <footer>
      <p>© Warda 2026</p>
    </footer>
    <script src="./code.js"></script>
  </body>
</html>
